name: Update Profile Stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats and build block
        uses: actions/github-script@v7
        id: stats
        with:
          script: |
            const owner = context.repo.owner;

            const year = new Date().getFullYear();
            const gql = await github.graphql(`query {
              user(login: "${owner}") {
                contributionsCollection(from: "${year}-01-01T00:00:00Z") {
                  totalCommitContributions
                  totalPullRequestContributions
                  contributionCalendar { totalContributions weeks { contributionDays { contributionCount date } } }
                }
                repositories(first: 100, ownerAffiliations: OWNER, isFork: false) {
                  nodes { languages(first: 5, orderBy: {field: SIZE, direction: DESC}) { edges { size node { name } } } }
                }
              }
            }`);
            const c = gql.user.contributionsCollection;
            const commits = c.totalCommitContributions.toLocaleString();
            const prs = c.totalPullRequestContributions.toLocaleString();

            // Streak
            const days = c.contributionCalendar.weeks.flatMap(w => w.contributionDays).reverse();
            let streak = 0;
            for (const d of days) {
              if (d.contributionCount > 0) streak++;
              else break;
            }

            // Languages from public repos via GraphQL
            const langBytes = {};
            for (const repo of gql.user.repositories.nodes) {
              for (const edge of repo.languages.edges) {
                langBytes[edge.node.name] = (langBytes[edge.node.name] || 0) + edge.size;
              }
            }
            const totalBytes = Object.values(langBytes).reduce((a, b) => a + b, 0);
            const top3 = Object.entries(langBytes)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 3)
              .map(([lang, bytes]) => ({
                lang,
                pct: Math.round(bytes / totalBytes * 100)
              }));

            const bar = (pct) => {
              const filled = Math.round(pct / 100 * 10);
              return '█'.repeat(filled) + '░'.repeat(10 - filled);
            };
            const pad = (s, n) => String(s).padStart(n);
            const rpad = (s, n) => String(s).padEnd(n);

            const lines = [
              `Commits  ${pad(commits, 8)}    ${rpad(top3[0]?.lang || '', 10)} ${bar(top3[0]?.pct || 0)}  ${pad((top3[0]?.pct || 0) + '%', 4)}`,
              `PRs      ${pad(prs, 8)}    ${rpad(top3[1]?.lang || '', 10)} ${bar(top3[1]?.pct || 0)}  ${pad((top3[1]?.pct || 0) + '%', 4)}`,
              `Streak   ${pad(streak + 'd', 8)}    ${rpad(top3[2]?.lang || '', 10)} ${bar(top3[2]?.pct || 0)}  ${pad((top3[2]?.pct || 0) + '%', 4)}`
            ];
            core.setOutput('block', lines.join('\n'));

      - name: Update README
        env:
          STATS_BLOCK: ${{ steps.stats.outputs.block }}
        run: |
          python3 -c "
          import os, re
          block = os.environ['STATS_BLOCK']
          with open('README.md', 'r') as f:
              content = f.read()
          pattern = r'<!--stats-->.*?<!--/stats-->'
          if re.search(pattern, content, flags=re.DOTALL):
              replacement = '<!--stats-->\n' + block + '\n<!--/stats-->'
              content = re.sub(pattern, replacement, content, flags=re.DOTALL)
              with open('README.md', 'w') as f:
                  f.write(content)
          "

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update profile stats" && git push)
