<svg xmlns="http://www.w3.org/2000/svg" width="840" height="240" viewBox="0 0 840 240">
  <defs>
    <style>
      @font-face {
        font-family: 'Inter';
        font-weight: 800;
        src: url('data:font/truetype;base64,') format('truetype');
      }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(88,166,255,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="840" height="240" fill="#0d1117" rx="8"/>
  <rect width="840" height="240" fill="url(#grid)" rx="8"/>

  <!-- Name -->
  <text x="420" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-2">Omer Zaman</text>

  <!-- Subtitle -->
  <text x="420" y="125" text-anchor="middle" font-family="monospace" font-size="12" fill="#484f58" letter-spacing="1">data &amp; analytics engineer</text>

  <!-- Pipeline -->
  <g transform="translate(140, 170)">
    <!-- Nodes -->
    <rect x="0" y="0" width="70" height="28" rx="6" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.6"/>
    <text x="35" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">sources</text>

    <text x="85" y="18" text-anchor="middle" font-family="monospace" font-size="12" fill="#30363d">→</text>

    <rect x="100" y="0" width="50" height="28" rx="6" fill="none" stroke="#238636" stroke-width="1" opacity="0.6"/>
    <text x="125" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">raw</text>

    <text x="165" y="18" text-anchor="middle" font-family="monospace" font-size="12" fill="#30363d">→</text>

    <rect x="180" y="0" width="70" height="28" rx="6" fill="none" stroke="#238636" stroke-width="1" opacity="0.6"/>
    <text x="215" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">staging</text>

    <text x="265" y="18" text-anchor="middle" font-family="monospace" font-size="12" fill="#30363d">→</text>

    <rect x="280" y="0" width="55" height="28" rx="6" fill="none" stroke="#238636" stroke-width="1" opacity="0.6"/>
    <text x="307" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">DWH</text>

    <text x="350" y="18" text-anchor="middle" font-family="monospace" font-size="12" fill="#30363d">→</text>

    <rect x="365" y="0" width="60" height="28" rx="6" fill="none" stroke="#238636" stroke-width="1" opacity="0.6"/>
    <text x="395" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">marts</text>

    <text x="440" y="18" text-anchor="middle" font-family="monospace" font-size="12" fill="#30363d">→</text>

    <rect x="455" y="0" width="70" height="28" rx="6" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.6"/>
    <text x="490" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">reports</text>
  </g>

  <!-- Subtle dot -->
  <circle cx="680" cy="184" r="3" fill="#238636" opacity="0.5"/>
</svg>
